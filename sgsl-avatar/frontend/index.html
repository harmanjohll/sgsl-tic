<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SgSL Avatar — Sign Language</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">

  <!-- EXACT same library versions as the working Kalidokit demo -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.133.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.133.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.133.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@0.6.7/lib/three-vrm.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic@0.5.1675471629/holistic.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3/drawing_utils.js" crossorigin="anonymous"></script>

  <script type="importmap">
  { "imports": { "kalidokit": "https://cdn.jsdelivr.net/npm/kalidokit@1.1.5/dist/kalidokit.es.js" } }
  </script>
</head>
<body>
  <header class="header">
    <h1>SgSL Avatar</h1>
    <nav class="tabs">
      <button class="tab active" data-tab="viewer">Viewer</button>
      <button class="tab" data-tab="record">Record</button>
      <a class="tab" href="/editor">Pose Editor</a>
    </nav>
  </header>

  <main id="tab-viewer" class="main tab-content active">
    <aside class="sidebar">
      <h2 class="sidebar-title">Curated Library</h2>
      <div id="sign-list-curated" class="sign-list"><p class="hint">Loading...</p></div>
      <h2 class="sidebar-title" style="margin-top:16px;">Recordings</h2>
      <div id="sign-list-recorded" class="sign-list"><p class="hint">Loading...</p></div>
    </aside>
    <section class="viewer">
      <div id="avatar-viewport" class="viewport"></div>
      <div class="controls">
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        <div class="control-row">
          <button id="btn-replay" class="btn">Replay</button>
          <button id="btn-pause" class="btn">Pause</button>
          <button id="btn-stop" class="btn">Stop</button>
          <span id="frame-info" class="frame-info">0 / 0</span>
          <label class="speed-control">Speed:
            <input type="range" id="speed-slider" min="0.2" max="3" step="0.1" value="1">
            <span id="speed-label">1.0x</span>
          </label>
        </div>
      </div>
      <div id="status" class="status status-info">Initializing...</div>
    </section>
  </main>

  <main id="tab-record" class="main tab-content">
    <section class="record-panel">
      <h2 class="sidebar-title">Camera</h2>
      <div class="camera-container">
        <video id="rec-video" class="rec-video" playsinline></video>
        <canvas id="rec-overlay" class="rec-overlay"></canvas>
        <div id="rec-camera-status" class="camera-status">Camera loading...</div>
        <div id="rec-framing" class="framing-badge bad">Framing: 0%</div>
      </div>
      <div class="rec-controls">
        <div class="rec-label-row">
          <label for="rec-label">Sign label:</label>
          <input type="text" id="rec-label" class="rec-input" placeholder="e.g. hello, thank_you">
        </div>
        <div class="rec-btn-row">
          <button id="btn-calibrate" class="btn" disabled>Calibrate (5 poses, ~10s)</button>
          <button id="btn-rec-start" class="btn btn-record" disabled>Record</button>
          <button id="btn-rec-stop" class="btn" disabled>Stop</button>
        </div>
        <div id="rec-timer" class="rec-timer"></div>
      </div>
      <div id="quality-panel" class="quality-panel hidden">
        <h3 class="quality-title">Quality Check</h3>
        <div id="quality-scores" class="quality-scores"></div>
        <div id="quality-overall" class="quality-overall"></div>
        <div class="rec-btn-row">
          <button id="btn-rec-preview" class="btn">Preview on Avatar</button>
          <button id="btn-rec-save" class="btn btn-save" disabled>Save Sign</button>
          <button id="btn-rec-discard" class="btn btn-discard">Discard</button>
        </div>
      </div>
      <div id="rec-status" class="status status-info">Enter a sign label and click Record.</div>
    </section>
    <section class="viewer">
      <!-- Right-pane modes for Record:
           - "live":     Mei mirrors the camera in real-time. Default before
                         recording; handy as a reference but imperfect (see
                         the plan: single-webcam retargeting has a ceiling).
           - "dots":     Dot playback of the captured frames. Shown after
                         Stop so the user can review what was actually
                         tracked before committing to Map-to-Mei.
           - "mei":      Mei animation derived from the captured frames
                         (computed by Map-to-Mei). Shown after the compute
                         step completes.
           Only one mode is visible at a time; swap via the "hidden" class. -->
      <div id="rec-avatar-viewport" class="viewport"></div>
      <canvas id="rec-dots-canvas" class="viewport hidden" width="640" height="480"></canvas>

      <div id="rec-review-controls" class="rec-review-controls hidden">
        <div class="control-row">
          <button id="btn-review-play" class="btn">▶ Play dots</button>
          <button id="btn-review-scrub" class="btn">■ Stop</button>
          <span id="rec-review-info" class="frame-info">0 / 0</span>
        </div>
        <div class="rec-btn-row">
          <button id="btn-map-to-mei" class="btn btn-save">Map to Mei →</button>
          <button id="btn-review-keep-dots" class="btn">Save as dots only</button>
          <button id="btn-review-rerecord" class="btn btn-discard">Re-record</button>
        </div>
      </div>

      <div id="rec-avatar-status" class="status status-info">Avatar will mirror your signing in real-time.</div>
      <pre id="rec-debug" style="font:11px/1.3 monospace;color:#88aacc;background:#111;padding:8px;border-radius:6px;max-height:200px;overflow:auto;white-space:pre-wrap;"></pre>
    </section>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
